<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Karnataka Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🌦️ Karnataka Weather</h1>

  <div class="input-box">
    <input type="text" value="Karnataka" disabled>

    <select id="district" onchange="updateTaluks()">
      <option value="">Select District</option>
    </select>

    <select id="taluk">
      <option value="">Select Taluk</option>
    </select>

    <button onclick="getWeather()">Check Weather</button>
  </div>

  <div class="weather-box" id="weatherBox">
    <h2 id="location"></h2>
    <p id="temp"></p>
    <p id="condition"></p>
    <p id="humidity"></p>
    <p id="wind"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
